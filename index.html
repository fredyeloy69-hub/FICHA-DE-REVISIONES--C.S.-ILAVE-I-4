<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Revisiones</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
    </style>
</head>
<body>
    <h1>Reporte de Revisiones - I.E. Sagrado Corazón</h1>
    <table id="tabla-revisiones">
        <thead>
            <tr>
                <th>Ítem</th>
                <th>Revisión/Observación</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // PEGA AQUÍ TU CONFIGURACIÓN DE 'image_4c66e1.png'
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "prueba-de-base-de-datos-bcd6f.firebaseapp.com",
            databaseURL: "https://prueba-de-base-de-datos-bcd6f-default-rtdb.firebaseio.com",
            projectId: "prueba-de-base-de-datos-bcd6f",
            storageBucket: "prueba-de-base-de-datos-bcd6f.appspot.com",
            messagingSenderId: "258260402501",
            appId: "1:258260402501:web:c2d1a95d772cd898ca7e2c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Referencia a tus datos en Firebase
        const revisionesRef = ref(db, 'revisiones');

        onValue(revisionesRef, (snapshot) => {
            const data = snapshot.val();
            const cuerpoTabla = document.getElementById('cuerpo-tabla');
            cuerpoTabla.innerHTML = ""; 

            data.forEach((item) => {
                let fila = `<tr>
                    <td>${item.N_ || ''}</td>
                    <td>${item.REVISION_ || ''}</td>
                    <td>${item.REVISION__1 || 'N/A'}</td>
                </tr>`;
                cuerpoTabla.innerHTML += fila;
            });
        });
    </script>
</body>
</html>
