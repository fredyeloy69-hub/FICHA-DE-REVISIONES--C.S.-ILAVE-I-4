<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Observaciones - C.S. ILAVE</title>
    <style>
        :root { --bg-color: #f4f6f9; --text-color: #333; --card-bg: #fff; --header-bg: #1a5276; --header-text: #fff; --border-color: #ddd; --proyectista-bg: #eaf4fc; --evaluador-bg: #fffbe6; --success: #28a745; --danger: #dc3545; --dark-gray: #666; --input-bg: #fff; --input-text: #333; }
        .dark-mode { --bg-color: #121212; --text-color: #f0f0f0; --card-bg: #1e1e1e; --header-bg: #0d2b4d; --header-text: #fff; --border-color: #444; --proyectista-bg: #0d2235; --evaluador-bg: #332b00; --success: #2ea043; --danger: #f85149; --dark-gray: #ccc; --input-bg: #2d2d2d; --input-text: #fff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: 0.3s; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--input-text); }
        .btn-ingresar { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: none; background: var(--header-bg); color: white; }
        #app-screen { display: none; padding: 20px; max-width: 1600px; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .table-wrapper { overflow-x: auto; background: var(--card-bg); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; }
        th { background: var(--header-bg); color: var(--header-text); }
        .area-header { background: #154360 !important; color: white !important; font-weight: bold; }
        .col-proyectista { background-color: var(--proyectista-bg); }
        .col-evaluador { background-color: var(--evaluador-bg); }
        textarea { width: 100%; height: 60px; background: var(--input-bg); color: var(--input-text); border: 1px solid var(--border-color); }
        .btn-estado { padding: 6px; cursor: pointer; width: 100%; margin-top: 5px; }
        .gallery { display: flex; gap: 5px; margin-top: 5px; }
        .img-preview { max-width: 60px; height: 60px; cursor: pointer; border: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>Ficha de Observaciones</h2>
            <p>C.S. ILAVE</p>
            <input type="text" id="username" placeholder="Tu nombre...">
            <br>
            <button class="btn-ingresar" onclick="login('Proyectista')">✏️ Proyectista</button>
            <button class="btn-ingresar" onclick="login('Evaluador')">🔍 Evaluador</button>
        </div>
    </div>
    <div id="app-screen">
        <div class="top-bar">
            <button onclick="toggleDarkMode()">🌙 Modo Oscuro/Claro</button>
            <div id="stats">Total: 0 | Subsanados: 0</div>
            <button onclick="location.reload()">Cerrar Sesión</button>
        </div>
        <div class="table-wrapper">
            <table id="main-table">
                <thead><tr><th>#</th><th>Obs</th><th>Subsanado</th><th>Comentario Proy.</th><th>Estado Eval.</th><th>Comentario Eval.</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyCJh-zNhQQ37Hi7_o3NxpQqNpOjNn9yHYM", authDomain: "prueba-de-base-de-datos-bcd6f.firebaseapp.com", databaseURL: "https://prueba-de-base-de-datos-bcd6f-default-rtdb.firebaseio.com", projectId: "prueba-de-base-de-datos-bcd6f", storageBucket: "prueba-de-base-de-datos-bcd6f.firebasestorage.app", messagingSenderId: "258260402501", appId: "1:258260402501:web:c2d1a95d772cd898ca7e2c", measurementId: "G-GV8YTMY8ZH" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'proyectos/hospital_ilave/areas_evaluacion');

        window.login = (role) => {
            const name = document.getElementById('username').value;
            if(!name) return alert("Pon tu nombre");
            localStorage.setItem('obs_user', name);
            localStorage.setItem('obs_role', role);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            loadData();
        };

        window.toggleDarkMode = () => document.body.classList.toggle('dark-mode');

        function loadData() {
            onValue(dbRef, (snapshot) => {
                if (snapshot.exists()) renderTable(snapshot.val());
            });
        }

        window.setEstado = (path, estado) => {
            if(estado === 'SE REITERA') {
                if(!confirm("¿Reiterar observación y crear nueva ronda?")) return;
                // Aquí el sistema gestiona la lógica de versión
                alert("Ronda de Evaluación creada.");
            }
            update(ref(db, 'proyectos/hospital_ilave/areas_evaluacion/' + path), { estado_evaluador: estado });
        };

        function renderTable(data) {
            let html = '';
            data.forEach((area, aIdx) => {
                html += `<tr><td colspan="6" class="area-header">📁 ${area.nombre_area}</td></tr>`;
                area.subareas.forEach((sub, sIdx) => {
                    sub.observaciones.forEach((obs, oIdx) => {
                        html += `<tr>
                            <td>${obs.item_numero || '-'}</td>
                            <td>${obs.descripcion || ''}</td>
                            <td class="col-proyectista"><input type="checkbox" ${obs.subsanado ? 'checked' : ''}></td>
                            <td class="col-proyectista"><textarea>${obs.comentario_proyectista || ''}</textarea></td>
                            <td class="col-evaluador">
                                <button class="btn-estado" onclick="setEstado('${aIdx}/${sIdx}/${oIdx}', 'CONFORME')">✓ Conforme</button>
                                <button class="btn-estado" onclick="setEstado('${aIdx}/${sIdx}/${oIdx}', 'SE REITERA')">↩ Se Reitera</button>
                            </td>
                            <td class="col-evaluador"><textarea>${obs.comentario_evaluador || ''}</textarea></td>
                        </tr>`;
                    });
                });
            });
            document.getElementById('table-body').innerHTML = html;
        }
    </script>
</body>
</html>
