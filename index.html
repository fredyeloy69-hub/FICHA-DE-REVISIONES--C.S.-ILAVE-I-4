<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Observaciones - C.S. ILAVE</title>
    <style>
        :root { --bg-color: #f4f6f9; --text-color: #333; --card-bg: #fff; --header-bg: #1a5276; --header-text: #fff; --border-color: #ddd; --proyectista-bg: #eaf4fc; --evaluador-bg: #fffbe6; --success: #28a745; --danger: #dc3545; --dark-gray: #666; --input-bg: #fff; --input-text: #333; }
        .dark-mode { --bg-color: #121212; --text-color: #f0f0f0; --card-bg: #1e1e1e; --header-bg: #0d2b4d; --header-text: #fff; --border-color: #444; --proyectista-bg: #0d2235; --evaluador-bg: #332b00; --success: #2ea043; --danger: #f85149; --dark-gray: #ccc; --input-bg: #2d2d2d; --input-text: #fff; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; margin: 100px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 6px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: none; background: var(--header-bg); color: white; }
        #app-screen { display: none; max-width: 1600px; margin: auto; }
        .table-wrapper { overflow-x: auto; background: var(--card-bg); padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--border-color); padding: 10px; }
        th { background: var(--header-bg); color: var(--header-text); }
        .area-header { background: #1a5276 !important; color: white !important; font-weight: bold; }
        .subarea-header { background: #2e4053 !important; color: white !important; }
        .col-proyectista { background-color: var(--proyectista-bg); }
        .col-evaluador { background-color: var(--evaluador-bg); }
        textarea { width: 100%; height: 60px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>Ficha de Observaciones</h2>
            <p>C.S. ILAVE</p>
            <input type="text" id="username" placeholder="Tu nombre...">
            <br>
            <button onclick="login('Proyectista')">✏️ Proyectista</button>
            <button onclick="login('Evaluador')">🔍 Evaluador</button>
        </div>
    </div>
    <div id="app-screen">
        <button onclick="toggleDarkMode()">🌙 Modo Oscuro/Claro</button>
        <button class="btn-logout" onclick="location.reload()">Cerrar Sesión</button>
        <div class="table-wrapper">
            <table id="main-table"><tbody id="table-body"></tbody></table>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCJh-zNhQQ37Hi7_o3NxpQqNpOjNn9yHYM", authDomain: "prueba-de-base-de-datos-bcd6f.firebaseapp.com", databaseURL: "https://prueba-de-base-de-datos-bcd6f-default-rtdb.firebaseio.com", projectId: "prueba-de-base-de-datos-bcd6f", storageBucket: "prueba-de-base-de-datos-bcd6f.firebasestorage.app", messagingSenderId: "258260402501", appId: "1:258260402501:web:c2d1a95d772cd898ca7e2c", measurementId: "G-GV8YTMY8ZH" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.login = (role) => {
            const name = document.getElementById('username').value;
            if(!name) return alert("Pon tu nombre");
            localStorage.setItem('obs_user', name);
            localStorage.setItem('obs_role', role);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
        };
        window.toggleDarkMode = () => document.body.classList.toggle('dark-mode');
    </script>
</body>
</html>
