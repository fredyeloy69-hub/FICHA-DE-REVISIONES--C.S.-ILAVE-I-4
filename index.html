<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Observaciones - C.S. ILAVE</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --text-color: #333;
            --card-bg: #fff;
            --header-bg: #1a5276;
            --header-text: #fff;
            --border-color: #ddd;
            --proyectista-bg: #eaf4fc;
            --evaluador-bg: #fffbe6;
            --success: #28a745;
            --danger: #dc3545;
            --dark-gray: #666;
            --input-bg: #fff;
            --input-text: #333;
        }
        .dark-mode {
            --bg-color: #121212;
            --text-color: #f0f0f0;
            --card-bg: #1e1e1e;
            --header-bg: #0d2b4d;
            --header-text: #fff;
            --border-color: #444;
            --proyectista-bg: #0d2235;
            --evaluador-bg: #332b00;
            --success: #2ea043;
            --danger: #f85149;
            --dark-gray: #ccc;
            --input-bg: #2d2d2d;
            --input-text: #fff;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: 0.3s; }
        #app-screen { padding: 20px; max-width: 1600px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); }
        th, td { border: 1px solid var(--border-color); padding: 10px; color: var(--text-color); }
        th { background: var(--header-bg); color: var(--header-text); }
        .col-proyectista { background-color: var(--proyectista-bg); }
        .col-evaluador { background-color: var(--evaluador-bg); }
        textarea { width: 100%; background: var(--input-bg); color: var(--input-text); border: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:999;">
        <div style="background:var(--card-bg); padding:40px; border-radius:12px; text-align:center;">
            <h2>Ficha de Observaciones</h2>
            <p>C.S. ILAVE</p>
            <input type="text" id="username" placeholder="Tu nombre..." style="padding:10px; width:80%; margin-bottom:10px;">
            <br>
            <button onclick="login('Proyectista')">✏️ Proyectista</button>
            <button onclick="login('Evaluador')">🔍 Evaluador</button>
        </div>
    </div>
    <div id="app-screen" style="display:none;">
        <button onclick="toggleDarkMode()">🌙 Modo Oscuro/Claro</button>
        <div class="table-wrapper">
            <table id="main-table"><tbody id="table-body"></tbody></table>
        </div>
    </div>
    <script type="module">
        // El script JS se mantiene igual que en versiones anteriores
    </script>
</body>
</html>
