<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Observaciones - Proyecto</title>
    <style>
        :root {
            --bg-color: #f4f6f9; --text-color: #333; --card-bg: #fff;
            --header-bg: #1a5276; --header-text: #fff; --border-color: #ddd;
            --proyectista-bg: #eaf4fc; --evaluador-bg: #fffbe6;
            --success: #28a745; --danger: #dc3545; --dark-gray: #555;
            --input-bg: #fff; --input-text: #333;
        }
        .dark-mode {
            --bg-color: #121212; --text-color: #e0e0e0; --card-bg: #1e1e1e;
            --header-bg: #0d2b4d; --header-text: #fff; --border-color: #444;
            --proyectista-bg: #0d2235; --evaluador-bg: #332b00;
            --success: #2ea043; --danger: #f85149; --dark-gray: #aaa;
            --input-bg: #2d2d2d; --input-text: #e0e0e0;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: 0.3s; }
        
        /* Correcciones de Contraste para Modo Oscuro */
        textarea, input, select { background-color: var(--input-bg) !important; color: var(--input-text) !important; border: 1px solid var(--border-color) !important; }
        th { background: var(--header-bg) !important; color: var(--header-text) !important; }
        
        /* LOGIN SCREEN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card-bg); padding: 40px 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 400px; }
        .login-icon { font-size: 45px; margin-bottom: 10px; }
        .login-box h2 { color: var(--header-bg); font-size: 24px; margin: 0 0 5px 0; }
        .login-subtitle { color: var(--dark-gray); font-size: 13px; margin: 0 0 20px 0; line-height: 1.4; }
        .login-box input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; background: var(--input-bg); color: var(--input-text); }
        .role-cards-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .role-card { flex: 1; border: 2px solid var(--border-color); border-radius: 8px; padding: 15px 10px; cursor: pointer; transition: all 0.2s; background: var(--card-bg); }
        .role-card.active { border-color: var(--header-bg); background-color: rgba(26, 82, 118, 0.05); }
        .rc-icon { font-size: 24px; margin-bottom: 8px; }
        .rc-title { font-weight: bold; font-size: 15px; color: var(--text-color); margin-bottom: 4px; }
        .rc-desc { font-size: 11px; color: var(--dark-gray); }
        .btn-ingresar { width: 100%; padding: 14px; background: var(--header-bg); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* APP SCREEN */
        #app-screen { display: none; padding: 20px; max-width: 1600px; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; background: var(--card-bg); padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .table-wrapper { overflow-x: auto; background: var(--card-bg); border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; font-size: 13px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; vertical-align: top; }
        th { background: var(--header-bg); color: var(--header-text); text-align: left; }
        .area-header { background: #154360 !important; color: white; font-size: 15px; font-weight: bold; }
        .col-proyectista { background-color: var(--proyectista-bg); }
        .col-evaluador { background-color: var(--evaluador-bg); }
        
        /* INTERACCIÓN */
        .btn-estado { padding: 6px 10px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; font-weight: bold; display: block; width: 100%; margin-bottom: 5px; background: transparent; transition: 0.2s; }
        .btn-conforme { border-color: var(--success); color: var(--success); }
        .btn-conforme.active { background: var(--success); color: white; }
        .btn-reitera { border-color: var(--danger); color: var(--danger); }
        .btn-reitera.active { background: var(--danger); color: white; }
        
        .img-preview { max-width: 80px; max-height: 80px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border-color); object-fit: cover; }
        .btn-delete-img { background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; margin-left: -10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="login-icon">🏗️</div>
            <h2>Ficha de Observaciones</h2>
            <input type="text" id="username" placeholder="Tu nombre completo...">
            <div class="role-cards-container">
                <div class="role-card" id="card-Proyectista" onclick="selectRoleTemp('Proyectista')"><div class="rc-title">Proyectista</div></div>
                <div class="role-card" id="card-Evaluador" onclick="selectRoleTemp('Evaluador')"><div class="rc-title">Evaluador</div></div>
            </div>
            <button class="btn-ingresar" onclick="executeLogin()">Ingresar</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="top-bar">
            <button onclick="toggleDarkMode()">🌙 Modo Oscuro/Claro</button>
            <div id="display-user"></div>
            <button onclick="logout()">Cerrar Sesión</button>
        </div>
        <div class="table-wrapper">
            <table id="main-table">
                <thead><tr><th>#</th><th>Obs</th><th>Subsanado</th><th>Resp.</th><th>Proy. Coment.</th><th>Estado</th><th>Evaluador</th><th>Eval. Coment.</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // CONFIGURACIÓN ORIGINAL
        const firebaseConfig = {
            apiKey: "AIzaSyCJh-zNhQQ37Hi7_o3NxpQqNpOjNn9yHYM",
            authDomain: "prueba-de-base-de-datos-bcd6f.firebaseapp.com",
            databaseURL: "https://prueba-de-base-de-datos-bcd6f-default-rtdb.firebaseio.com",
            projectId: "prueba-de-base-de-datos-bcd6f",
            storageBucket: "prueba-de-base-de-datos-bcd6f.firebasestorage.app",
            messagingSenderId: "258260402501",
            appId: "1:258260402501:web:c2d1a95d772cd898ca7e2c",
            measurementId: "G-GV8YTMY8ZH"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LÓGICA DE RONDA INTEGRADA ---
        window.setEstadoEvaluador = (aIdx, sIdx, oIdx, estado) => {
            if(localStorage.getItem('obs_role') !== 'Evaluador') return;
            const path = `proyectos/hospital_ilave/areas_evaluacion/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            
            if(estado === 'SE REITERA') {
                if(!confirm("¿Reiterar? Se guardará el comentario actual en el historial y se abrirá nueva ronda.")) return;
                
                // Obtenemos referencia actual para leer comentario antes de limpiar
                const obsRef = ref(db, path);
                
                // Para efectos de este código, asumimos que estamos en el contexto donde puedes leer projectData
                const obs = projectData[aIdx].subareas[sIdx].observaciones[oIdx];
                const hist = obs.historial_rondas || [];
                hist.push({ fecha: new Date().toLocaleString(), comentario: obs.comentario_evaluador || "" });

                update(ref(db, path), {
                    estado_evaluador: 'SE REITERA',
                    comentario_evaluador: "", // Campo principal limpio para nueva ronda
                    historial_rondas: hist
                });
            } else {
                update(ref(db, path), { 
                    estado_evaluador: estado, 
                    evaluador: localStorage.getItem('obs_user'),
                    fecha_evaluacion: new Date().toLocaleString() 
                });
            }
        };

        // --- TODO TU CÓDIGO ORIGINAL (PEGA AQUÍ EL RESTO DE TUS FUNCIONES) ---
        // 
        function loadData() {
            onValue(dbRef, (snapshot) => {
                if (snapshot.exists()) {
                    projectData = snapshot.val();
                    updateFiltersDropdowns();
                    renderTable();
                } else {
                    document.getElementById("table-body").innerHTML = `<tr><td colspan="8" style="text-align:center;">No hay datos en Firebase.</td></tr>`;
                }
            });
        }

        // LÓGICA DE FILTROS
        function updateFiltersDropdowns() {
            const proySet = new Set();
            const evalSet = new Set();
            
            projectData.forEach(area => {
                if(area.subareas) {
                    area.subareas.forEach(subarea => {
                        if(subarea.observaciones) {
                            subarea.observaciones.forEach(obs => {
                                if(obs.responsable) proySet.add(obs.responsable);
                                if(obs.evaluador) evalSet.add(obs.evaluador);
                                if(obs.historial_acciones) {
                                    obs.historial_acciones.forEach(h => { if(h.usuario) proySet.add(h.usuario); });
                                }
                            });
                        }
                    });
                }
            });

            const selProy = document.getElementById('filter-proy');
            const currentProy = selProy.value;
            selProy.innerHTML = '<option value="TODOS">Todos los Proyectistas</option>';
            [...proySet].sort().forEach(p => selProy.innerHTML += `<option value="${p}">${p}</option>`);
            if(proySet.has(currentProy)) selProy.value = currentProy;

            const selEval = document.getElementById('filter-eval');
            const currentEval = selEval.value;
            selEval.innerHTML = '<option value="TODOS">Todos los Evaluadores</option>';
            [...evalSet].sort().forEach(e => selEval.innerHTML += `<option value="${e}">${e}</option>`);
            if(evalSet.has(currentEval)) selEval.value = currentEval;
        }

        // ACCIONES PROYECTISTA
        window.toggleSubsanado = (aIdx, sIdx, oIdx, isChecked) => {
            if(currentRole !== 'Proyectista') return;
            const obs = projectData[aIdx].subareas[sIdx].observaciones[oIdx];
            
            // Historial
            let historial = obs.historial_acciones || [];
            historial.push({
                accion: isChecked ? 'Marcó' : 'Desmarcó',
                fecha: getFechaHora(),
                usuario: currentUser
            });

            const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            update(ref(db, path), {
                subsanado: isChecked,
                responsable: currentUser,
                fecha_levantamiento: getFechaHora(),
                historial_acciones: historial
            });
        };

        window.saveComment = (aIdx, sIdx, oIdx, type, text) => {
            const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            update(ref(db, path), { [type === 'proyectista' ? 'comentario_proyectista' : 'comentario_evaluador']: text });
        };

        // ACCIONES EVALUADOR
        window.setEstadoEvaluador = (aIdx, sIdx, oIdx, estado) => {
            if(currentRole !== 'Evaluador') return;
            const obs = projectData[aIdx].subareas[sIdx].observaciones[oIdx];
            const nuevoEstado = (obs.estado_evaluador === estado) ? "" : estado;
            
            const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            update(ref(db, path), {
                estado_evaluador: nuevoEstado,
                evaluador: currentUser,
                fecha_evaluacion: nuevoEstado !== "" ? getFechaHora() : ""
            });
        };

        // GALERÍA DE IMÁGENES (MÚLTIPLES)
        window.handlePaste = (e, aIdx, sIdx, oIdx, type) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64data = event.target.result;
                        const obs = projectData[aIdx].subareas[sIdx].observaciones[oIdx];
                        
                        let images = type === 'proyectista' ? (obs.galeria_proyectista || []) : (obs.galeria_evaluador || []);
                        images.push(base64data);
                        
                        const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
                        update(ref(db, path), { [type === 'proyectista' ? 'galeria_proyectista' : 'galeria_evaluador']: images });
                    };
                    reader.readAsDataURL(blob);
                }
            }
        };

        window.deleteImage = (aIdx, sIdx, oIdx, type, imgIdx) => {
            if(!confirm("¿Borrar esta imagen?")) return;
            const obs = projectData[aIdx].subareas[sIdx].observaciones[oIdx];
            let images = type === 'proyectista' ? (obs.galeria_proyectista || []) : (obs.galeria_evaluador || []);
            
            images.splice(imgIdx, 1);
            const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            update(ref(db, path), { [type === 'proyectista' ? 'galeria_proyectista' : 'galeria_evaluador']: images });
        };

        window.viewImage = (src) => {
            document.getElementById('img-modal-src').src = src;
            document.getElementById('img-modal').style.display = 'flex';
        };

        // RENDERIZADO VISUAL
        window.renderTable = () => {
            const fProy = document.getElementById('filter-proy').value;
            const fEval = document.getElementById('filter-eval').value;
            
            let html = '';
            let total = 0, subsanados = 0, pendientes = 0;
            const isProy = currentRole === 'Proyectista';
            const isEval = currentRole === 'Evaluador';

            projectData.forEach((area, aIdx) => {
                let areaHtml = '';
                let matchInArea = false;
                
                areaHtml += `<tr><td colspan="8" class="area-header">📁 ${area.nombre_area}</td></tr>`;
                
                if(area.subareas) {
                    area.subareas.forEach((subarea, sIdx) => {
                        let subareaHtml = '';
                        let matchInSubarea = false;
                        
                        if(subarea.nombre_subarea !== "GENERAL") {
                            subareaHtml += `<tr><td colspan="8" class="subarea-header">📂 ${subarea.nombre_subarea}</td></tr>`;
                        }
                        
                        if(subarea.observaciones) {
                            subarea.observaciones.forEach((obs, oIdx) => {
                                // Aplicar Filtros
                                let passFilter = true;
                                if(fProy !== "TODOS" && obs.responsable !== fProy) passFilter = false;
                                if(fEval !== "TODOS" && obs.evaluador !== fEval) passFilter = false;
                                
                                if(passFilter) {
                                    matchInSubarea = true;
                                    matchInArea = true;
                                    total++;
                                    if(obs.subsanado) subsanados++; else pendientes++;

                                    // Lógica Proyectista
                                    const isSubsanado = obs.subsanado ? "checked" : "";
                                    const disableProy = !isProy ? "disabled" : "";
                                    const respText = obs.responsable ? `<b>${obs.responsable}</b><br><span style="font-size:10px">${obs.fecha_levantamiento||''}</span>` : "-";
                                    
                                    let histProy = "";
                                    if(obs.historial_acciones && obs.historial_acciones.length > 0) {
                                        histProy = `<ul class="history-log">` + 
                                            obs.historial_acciones.map(h => `<li>${h.accion}: ${h.fecha}</li>`).join('') + 
                                            `</ul>`;
                                    }

                                    const comProy = obs.comentario_proyectista || "";
                                    const galProy = (obs.galeria_proyectista || []).map((src, i) => `
                                        <div class="img-container">
                                            <img src="${src}" class="img-preview" onclick="viewImage('${src}')">
                                            <button class="btn-delete-img" ${disableProy} onclick="deleteImage(${aIdx},${sIdx},${oIdx},'proyectista',${i})">X</button>
                                        </div>
                                    `).join('');

                                    // Lógica Evaluador
                                    const disableEval = !isEval ? "disabled" : "";
                                    const estEval = obs.estado_evaluador || "";
                                    const clsConforme = estEval === "CONFORME" ? "active" : "";
                                    const clsReitera = estEval === "SE REITERA" ? "active" : "";
                                    const evalText = obs.evaluador ? `<b>${obs.evaluador}</b><br><span style="font-size:10px">${obs.fecha_evaluacion||''}</span>` : "-";
                                    
                                    const comEval = obs.comentario_evaluador || "";
                                    const galEval = (obs.galeria_evaluador || []).map((src, i) => `
                                        <div class="img-container">
                                            <img src="${src}" class="img-preview" onclick="viewImage('${src}')">
                                            <button class="btn-delete-img" ${disableEval} onclick="deleteImage(${aIdx},${sIdx},${oIdx},'evaluador',${i})">X</button>
                                        </div>
                                    `).join('');

                                    subareaHtml += `
                                    <tr>
                                        <td>${obs.item_numero || '-'}</td>
                                        <td>${obs.descripcion || ''}</td>
                                        
                                        <!-- PROYECTISTA -->
                                        <td class="col-proyectista" style="text-align:center;">
                                            <label class="switch">
                                                <input type="checkbox" ${isSubsanado} ${disableProy} onchange="toggleSubsanado(${aIdx}, ${sIdx}, ${oIdx}, this.checked)">
                                                <span class="slider"></span>
                                            </label>
                                            ${histProy}
                                        </td>
                                        <td class="col-proyectista">${respText}</td>
                                        <td class="col-proyectista">
                                            <textarea placeholder="Comentario..." ${disableProy} 
                                                onchange="saveComment(${aIdx}, ${sIdx}, ${oIdx}, 'proyectista', this.value)"
                                                onpaste="handlePaste(event, ${aIdx}, ${sIdx}, ${oIdx}, 'proyectista')">${comProy}</textarea>
                                            <div class="paste-hint">📸 Pegar captura (Ctrl+V) aquí</div>
                                            <div class="gallery">${galProy}</div>
                                        </td>

                                        <!-- EVALUADOR -->
                                        <td class="col-evaluador">
                                            <button class="btn-estado btn-conforme ${clsConforme}" ${disableEval} onclick="setEstadoEvaluador(${aIdx}, ${sIdx}, ${oIdx}, 'CONFORME')">✓ CONFORME</button>
                                            <button class="btn-estado btn-reitera ${clsReitera}" ${disableEval} onclick="setEstadoEvaluador(${aIdx}, ${sIdx}, ${oIdx}, 'SE REITERA')">↩ SE REITERA</button>
                                        </td>
                                        <td class="col-evaluador">${evalText}</td>
                                        <td class="col-evaluador">
                                            <textarea placeholder="Comentario evaluador..." ${disableEval} 
                                                onchange="saveComment(${aIdx}, ${sIdx}, ${oIdx}, 'evaluador', this.value)"
                                                onpaste="handlePaste(event, ${aIdx}, ${sIdx}, ${oIdx}, 'evaluador')">${comEval}</textarea>
                                            <div class="paste-hint">📸 Pegar captura (Ctrl+V) aquí</div>
                                            <div class="gallery">${galEval}</div>
                                        </td>
                                    </tr>`;
                                }
                            });
                        }
                        if(matchInSubarea) areaHtml += subareaHtml;
                    });
                }
                if(matchInArea) html += areaHtml;
            });

            if(total === 0) {
                html = `<tr><td colspan="8" style="text-align:center;">No hay observaciones que coincidan con el filtro.</td></tr>`;
            }

            document.getElementById('table-body').innerHTML = html;
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-sub').innerText = subsanados;
            document.getElementById('count-pen').innerText = pendientes;
        };
    </script>
</body>
</html>
</body>
</html>
