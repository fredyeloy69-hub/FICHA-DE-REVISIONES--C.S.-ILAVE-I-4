<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Observaciones - Proyecto</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --text-color: #333;
            --card-bg: #fff;
            --header-bg: #004a8c;
            --header-text: #fff;
            --border-color: #ddd;
            --row-alt: #f9f9f9;
            --proyectista-bg: #eaf4fc;
            --evaluador-bg: #fffbe6;
            --success: #28a745;
            --danger: #dc3545;
            --dark-gray: #555;
        }
        
        .dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --header-bg: #0d2b4d;
            --header-text: #fff;
            --border-color: #333;
            --row-alt: #2a2a2a;
            --proyectista-bg: #0a1929;
            --evaluador-bg: #332b00;
            --success: #1e7e34;
            --danger: #bd2130;
            --dark-gray: #aaa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        
        /* LOGIN SCREEN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        .login-box h2 { color: var(--text-color); margin-top: 0; }
        .login-box input { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid var(--border-color); border-radius: 6px; font-size: 16px; background: var(--bg-color); color: var(--text-color); }
        .role-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-role { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s; }
        .btn-proyectista { background: #0056b3; color: white; }
        .btn-evaluador { background: #6f42c1; color: white; }
        .btn-role:hover { opacity: 0.9; }

        /* APP SCREEN */
        #app-screen { display: none; padding: 20px; max-width: 1500px; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-info { font-weight: bold; color: var(--header-bg); font-size: 16px; }
        .stats-bar { display: flex; gap: 20px; font-size: 18px; font-weight: bold; }
        .stat-total { color: #0056b3; }
        .stat-sub { color: var(--success); }
        .stat-pen { color: var(--danger); }
        
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn-dark { background: #333; color: white; padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-logout { background: var(--danger); color: white; padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; }

        /* TABLE */
        .table-wrapper { overflow-x: auto; background: var(--card-bg); border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; font-size: 13px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; vertical-align: top; }
        th { background: var(--header-bg); color: var(--header-text); text-align: left; }
        .area-header { background: #1a5276 !important; color: white; font-size: 15px; font-weight: bold; }
        
        /* ZONAS */
        .col-proyectista { background-color: var(--proyectista-bg); }
        .col-evaluador { background-color: var(--evaluador-bg); }
        
        /* TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }
        input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }

        /* BUTTONS EVALUADOR */
        .btn-estado { padding: 6px 10px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; font-weight: bold; display: block; width: 100%; margin-bottom: 5px; background: transparent; transition: 0.2s; }
        .btn-conforme { border-color: var(--success); color: var(--success); }
        .btn-conforme.active { background: var(--success); color: white; }
        .btn-reitera { border-color: var(--danger); color: var(--danger); }
        .btn-reitera.active { background: var(--danger); color: white; }
        .btn-estado:disabled { opacity: 0.5; cursor: not-allowed; }

        /* INPUTS & TEXTAREAS */
        textarea { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--card-bg); color: var(--text-color); resize: vertical; min-height: 50px; }
        textarea:disabled { opacity: 0.6; cursor: not-allowed; }
        .timestamp { font-size: 11px; color: var(--dark-gray); margin-top: 5px; font-style: italic; }
        
        /* IMAGE PREVIEW */
        .img-preview { max-width: 100px; max-height: 100px; margin-top: 5px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border-color); }
        .paste-hint { font-size: 11px; color: #888; margin-top: 2px; }
        
        /* MODAL IMAGEN */
        #img-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        #img-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Ficha de Observaciones</h2>
            <p>Ingresa tus datos para continuar</p>
            <input type="text" id="username" placeholder="Tu nombre completo..." autocomplete="off">
            <div class="role-buttons">
                <button class="btn-role btn-proyectista" onclick="login('Proyectista')">✏️ Proyectista</button>
                <button class="btn-role btn-evaluador" onclick="login('Evaluador')">🔍 Evaluador</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL DE LA APP -->
    <div id="app-screen">
        <div class="top-bar">
            <div class="user-info" id="display-user">Usuario: ...</div>
            <div class="stats-bar">
                <span class="stat-total">Total: <span id="count-total">0</span></span>
                <span class="stat-sub">Subsanados: <span id="count-sub">0</span></span>
                <span class="stat-pen">Pendientes: <span id="count-pen">0</span></span>
            </div>
            <div class="controls">
                <button class="btn-dark" onclick="toggleDarkMode()">🌙 Oscuro / Claro</button>
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="main-table">
                <thead>
                    <tr>
                        <th style="width: 40px;">#</th>
                        <th style="width: 300px;">OBSERVACIÓN / BITÁCORA</th>
                        <th class="col-proyectista" style="width: 80px; text-align:center;">SUBSANADO</th>
                        <th class="col-proyectista" style="width: 150px;">RESPONSABLE</th>
                        <th class="col-proyectista" style="width: 100px;">FECHA LEVANT.</th>
                        <th class="col-proyectista" style="width: 250px;">COMENTARIO PROYECTISTA</th>
                        <th class="col-evaluador" style="width: 130px; text-align:center;">ESTADO EVALUADOR</th>
                        <th class="col-evaluador" style="width: 100px;">FECHA EVALUACIÓN</th>
                        <th class="col-evaluador" style="width: 250px;">COMENTARIO EVALUADOR</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="9" style="text-align: center; padding: 20px;">Cargando datos desde Firebase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL PARA VER IMAGEN EN GRANDE -->
    <div id="img-modal" onclick="this.style.display='none'">
        <img id="img-modal-src" src="">
    </div>

    <!-- FIREBASE & LÓGICA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // CONFIGURACIÓN DE FIREBASE (Intacta)
        const firebaseConfig = {
            apiKey: "AIzaSyCJh-zNhQQ37Hi7_o3NxpQqNpOjNn9yHYM",
            authDomain: "prueba-de-base-de-datos-bcd6f.firebaseapp.com",
            databaseURL: "https://prueba-de-base-de-datos-bcd6f-default-rtdb.firebaseio.com",
            projectId: "prueba-de-base-de-datos-bcd6f",
            storageBucket: "prueba-de-base-de-datos-bcd6f.firebasestorage.app",
            messagingSenderId: "258260402501",
            appId: "1:258260402501:web:c2d1a95d772cd898ca7e2c",
            measurementId: "G-GV8YTMY8ZH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRefPath = 'proyectos/hospital_ilave/areas_evaluacion';
        const dbRef = ref(db, dbRefPath);

        // ESTADO GLOBAL
        let currentUser = "";
        let currentRole = ""; // "Proyectista" o "Evaluador"
        let projectData = [];

        // INICIALIZACIÓN
        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            
            const savedUser = localStorage.getItem('obs_user');
            const savedRole = localStorage.getItem('obs_role');
            if(savedUser && savedRole) {
                document.getElementById('username').value = savedUser;
                login(savedRole);
            }
        };

        // LOGIN
        window.login = (role) => {
            const name = document.getElementById('username').value.trim();
            if(!name) { alert("Por favor, ingresa tu nombre completo."); return; }
            
            currentUser = name;
            currentRole = role;
            localStorage.setItem('obs_user', name);
            localStorage.setItem('obs_role', role);
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('display-user').innerText = `👤 ${name} (${role})`;

            loadData();
        };

        window.logout = () => {
            localStorage.removeItem('obs_user');
            localStorage.removeItem('obs_role');
            location.reload();
        };

        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };

        // CARGAR DATOS EN TIEMPO REAL
        function loadData() {
            onValue(dbRef, (snapshot) => {
                if (snapshot.exists()) {
                    projectData = snapshot.val();
                    renderTable();
                } else {
                    document.getElementById("table-body").innerHTML = `<tr><td colspan="9" style="text-align:center;">No hay datos en Firebase.</td></tr>`;
                }
            });
        }

        // FUNCIONES DE ACTUALIZACIÓN EN FIREBASE
        const getFechaHora = () => {
            const now = new Date();
            return now.toLocaleString('es-PE', { hour12: false });
        };

        window.toggleSubsanado = (aIdx, sIdx, oIdx, isChecked) => {
            if(currentRole !== 'Proyectista') return;
            const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            
            const updates = {
                subsanado: isChecked,
                responsable: isChecked ? currentUser : "",
                fecha_levantamiento: isChecked ? getFechaHora() : ""
            };
            update(ref(db, path), updates);
        };

        window.setEstadoEvaluador = (aIdx, sIdx, oIdx, estado) => {
            if(currentRole !== 'Evaluador') return;
            const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            
            // Si hace clic en el que ya está activo, lo desmarca (reversible)
            const obs = projectData[aIdx].subareas[sIdx].observaciones[oIdx];
            const nuevoEstado = (obs.estado_evaluador === estado) ? "" : estado;
            
            const updates = {
                estado_evaluador: nuevoEstado,
                fecha_evaluacion: nuevoEstado !== "" ? getFechaHora() : ""
            };
            update(ref(db, path), updates);
        };

        window.saveComment = (aIdx, sIdx, oIdx, type, text) => {
            const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
            const updates = {};
            if(type === 'proyectista') updates.comentario_proyectista = text;
            if(type === 'evaluador') updates.comentario_evaluador = text;
            update(ref(db, path), updates);
        };

        // PEGAR IMÁGENES (Ctrl+V)
        window.handlePaste = (e, aIdx, sIdx, oIdx, type) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64data = event.target.result;
                        const path = `${dbRefPath}/${aIdx}/subareas/${sIdx}/observaciones/${oIdx}`;
                        const updates = {};
                        if(type === 'proyectista') updates.imagen_proyectista = base64data;
                        if(type === 'evaluador') updates.imagen_evaluador = base64data;
                        update(ref(db, path), updates);
                    };
                    reader.readAsDataURL(blob);
                }
            }
        };

        window.viewImage = (src) => {
            document.getElementById('img-modal-src').src = src;
            document.getElementById('img-modal').style.display = 'flex';
        };

        // DIBUJAR LA TABLA
        function renderTable() {
            let html = '';
            let total = 0, subsanados = 0, pendientes = 0;
            const isProy = currentRole === 'Proyectista';
            const isEval = currentRole === 'Evaluador';

            projectData.forEach((area, aIdx) => {
                html += `<tr><td colspan="9" class="area-header">📁 ${area.nombre_area}</td></tr>`;
                
                if(area.subareas) {
                    area.subareas.forEach((subarea, sIdx) => {
                        if(subarea.nombre_subarea !== "GENERAL") {
                            html += `<tr style="background:#e9ecef; font-weight:bold; color:black;"><td colspan="9" style="padding-left:20px;">📂 ${subarea.nombre_subarea}</td></tr>`;
                        }
                        
                        if(subarea.observaciones) {
                            subarea.observaciones.forEach((obs, oIdx) => {
                                total++;
                                if(obs.subsanado) subsanados++; else pendientes++;

                                // Lógica Proyectista
                                const isSubsanado = obs.subsanado ? "checked" : "";
                                const disableProy = !isProy ? "disabled" : "";
                                const respText = obs.responsable || "";
                                const fechaProy = obs.fecha_levantamiento || "";
                                const comProy = obs.comentario_proyectista || "";
                                const imgProy = obs.imagen_proyectista ? `<img src="${obs.imagen_proyectista}" class="img-preview" onclick="viewImage('${obs.imagen_proyectista}')">` : "";

                                // Lógica Evaluador
                                const disableEval = !isEval ? "disabled" : "";
                                const estEval = obs.estado_evaluador || "";
                                const clsConforme = estEval === "CONFORME" ? "active" : "";
                                const clsReitera = estEval === "SE REITERA" ? "active" : "";
                                const fechaEval = obs.fecha_evaluacion || "";
                                const comEval = obs.comentario_evaluador || "";
                                const imgEval = obs.imagen_evaluador ? `<img src="${obs.imagen_evaluador}" class="img-preview" onclick="viewImage('${obs.imagen_evaluador}')">` : "";

                                html += `
                                <tr>
                                    <td>${obs.item_numero || '-'}</td>
                                    <td>${obs.descripcion || ''}</td>
                                    
                                    <!-- PROYECTISTA -->
                                    <td class="col-proyectista" style="text-align:center;">
                                        <label class="switch">
                                            <input type="checkbox" ${isSubsanado} ${disableProy} onchange="toggleSubsanado(${aIdx}, ${sIdx}, ${oIdx}, this.checked)">
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td class="col-proyectista">${respText}</td>
                                    <td class="col-proyectista timestamp">${fechaProy}</td>
                                    <td class="col-proyectista">
                                        <textarea placeholder="Comentario o Ctrl+V..." ${disableProy} 
                                            onchange="saveComment(${aIdx}, ${sIdx}, ${oIdx}, 'proyectista', this.value)"
                                            onpaste="handlePaste(event, ${aIdx}, ${sIdx}, ${oIdx}, 'proyectista')">${comProy}</textarea>
                                        <div class="paste-hint">📸 Pegar captura (Ctrl+V)</div>
                                        ${imgProy}
                                    </td>

                                    <!-- EVALUADOR -->
                                    <td class="col-evaluador">
                                        <button class="btn-estado btn-conforme ${clsConforme}" ${disableEval} onclick="setEstadoEvaluador(${aIdx}, ${sIdx}, ${oIdx}, 'CONFORME')">✓ CONFORME</button>
                                        <button class="btn-estado btn-reitera ${clsReitera}" ${disableEval} onclick="setEstadoEvaluador(${aIdx}, ${sIdx}, ${oIdx}, 'SE REITERA')">↩ SE REITERA</button>
                                    </td>
                                    <td class="col-evaluador timestamp">${fechaEval}</td>
                                    <td class="col-evaluador">
                                        <textarea placeholder="Comentario o Ctrl+V..." ${disableEval} 
                                            onchange="saveComment(${aIdx}, ${sIdx}, ${oIdx}, 'evaluador', this.value)"
                                            onpaste="handlePaste(event, ${aIdx}, ${sIdx}, ${oIdx}, 'evaluador')">${comEval}</textarea>
                                        <div class="paste-hint">📸 Pegar captura (Ctrl+V)</div>
                                        ${imgEval}
                                    </td>
                                </tr>`;
                            });
                        }
                    });
                }
            });

            document.getElementById('table-body').innerHTML = html;
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-sub').innerText = subsanados;
            document.getElementById('count-pen').innerText = pendientes;
        }
    </script>
</body>
</html>
